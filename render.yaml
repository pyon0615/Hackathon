services:
  - type: web
    name: locwise-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://spotigy.vercel.app
    plan: free
